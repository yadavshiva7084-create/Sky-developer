<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARK SHOT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2233;
    --orange: #ff6600;
    --dark: #080a0e;
    --darker: #050608;
    --card: #0d1117;
    --border: rgba(255,34,51,0.25);
    --text: #e8eaf0;
    --muted: #7a8090;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* animated grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,34,51,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,34,51,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  /* --- HERO --- */
  .hero {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown 0.8s ease both;
  }

  .avatar-ring {
    width: 110px;
    height: 110px;
    margin: 0 auto 1.5rem;
    position: relative;
  }

  .avatar-ring::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(var(--red), var(--orange), var(--red), transparent 60%);
    animation: spin 3s linear infinite;
  }

  .avatar-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--card);
    border: 2px solid var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    color: var(--red);
    letter-spacing: 2px;
  }

  .name {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 8vw, 3.2rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    line-height: 1;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #fff 30%, var(--red) 70%, var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 1rem;
    color: var(--muted);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 1rem;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    margin: 0 auto;
  }

  /* --- CARDS --- */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 1.1rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
    animation: fadeUp 0.6s ease both;
  }

  .card:nth-child(1) { animation-delay: 0.15s; }
  .card:nth-child(2) { animation-delay: 0.25s; }
  .card:nth-child(3) { animation-delay: 0.35s; }

  .card:hover {
    border-color: var(--red);
    background: #12161e;
    transform: translateX(4px);
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
  }

  .card-icon.yt { background: rgba(255,0,0,0.12); }
  .card-icon.ig { background: rgba(200,80,200,0.12); }
  .card-icon.ff { background: rgba(255,102,0,0.12); }

  .card-icon svg { width: 22px; height: 22px; }

  .card-info { flex: 1; min-width: 0; }

  .card-platform {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
    margin-bottom: 2px;
  }

  .card-name {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-detail {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .card-arrow {
    color: var(--red);
    font-size: 18px;
    opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s;
    flex-shrink: 0;
  }

  .card:hover .card-arrow {
    opacity: 1;
    transform: translateX(3px);
  }

  /* non-link card */
  .card.static { cursor: default; }
  .card.static:hover { transform: none; }

  /* FF uid copy */
  .uid-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .uid-badge {
    font-size: 11px;
    font-family: 'Orbitron', monospace;
    color: var(--orange);
    background: rgba(255,102,0,0.1);
    border: 0.5px solid rgba(255,102,0,0.3);
    border-radius: 4px;
    padding: 2px 8px;
    letter-spacing: 0.05em;
  }

  .copy-btn {
    font-size: 10px;
    font-family: 'Rajdhani', sans-serif;
    color: var(--muted);
    background: transparent;
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s, border-color 0.2s;
  }

  .copy-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

  /* footer */
  .footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 11px;
    color: rgba(255,255,255,0.1);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: fadeUp 0.6s 0.5s ease both;
  }

  /* animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="hero">
    <div class="avatar-ring">
      <div class="avatar-inner">DS</div>
    </div>
    <div class="name">DARK SHOT</div>
    <div class="tagline">Content Creator &nbsp;·&nbsp; Gamer</div>
    <div class="divider"></div>
  </div>

  <div class="cards">

    <!-- YouTube -->
    <a class="card" href="https://youtube.com/@DarkShot47" target="_blank" rel="noopener">
      <div class="card-icon yt">
        <svg viewBox="0 0 24 24" fill="#ff0000"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8z"/><polygon fill="#fff" points="9.75,15.5 15.5,12 9.75,8.5"/></svg>
      </div>
      <div class="card-info">
        <div class="card-platform">YouTube</div>
        <div class="card-name">@DarkShot47</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <!-- Instagram -->
    <a class="card" href="https://instagram.com/db7.vladz" target="_blank" rel="noopener">
      <div class="card-icon ig">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#ig-grad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="ig-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f09433"/>
              <stop offset="50%" stop-color="#e6683c"/>
              <stop offset="100%" stop-color="#bc1888"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="url(#ig-grad)" stroke="none"/>
        </svg>
      </div>
      <div class="card-info">
        <div class="card-platform">Instagram</div>
        <div class="card-name">@db7.vladz</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <!-- Free Fire -->
    <div class="card static">
      <div class="card-icon ff">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L3 7v10l9 5 9-5V7z"/>
          <path d="M12 2v20M3 7l9 5 9-5"/>
        </svg>
      </div>
      <div class="card-info">
        <div class="card-platform">Free Fire</div>
        <div class="card-name">DB7.VLADZ</div>
        <div class="uid-row">
          <span class="uid-badge" id="uid-text">UID: 7706807308</span>
          <button class="copy-btn" onclick="copyUID()">Copy</button>
        </div>
      </div>
    </div>

  </div>

  <div class="footer">DARK SHOT &nbsp;·&nbsp; 2025</div>
</div>

<script>
function copyUID() {
  navigator.clipboard.writeText('7706807308').then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    btn.style.color = '#ff6600';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
  });
}
</script>
</body>
</html>
